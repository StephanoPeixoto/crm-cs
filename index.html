<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo Serviços A7</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 40px;
}
h1 { color: #d4af37; }
input, button {
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    border: none;
}
input { width: 100%; }
button {
    background: #d4af37;
    color: #000;
    cursor: pointer;
}
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}
th, td {
    border-bottom: 1px solid #333;
    padding: 10px;
}
</style>
</head>
<body>

<h1>Fluxo Serviços A7</h1>

<h3>Nova Tarefa</h3>
<input id="client" placeholder="Cliente">
<input id="task" placeholder="Tarefa">
<input id="owner" placeholder="Responsável">
<input id="due_date" type="date">
<input id="link" placeholder="Link">
<button onclick="addTask()">Adicionar</button>

<table>
<thead>
<tr>
<th>Cliente</th>
<th>Tarefa</th>
<th>Responsável</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tasks"></tbody>
</table>

<script>

const SUPABASE_URL = "https://llkzmbuaoxvaadnhfwhq.supabase.co";
const SUPABASE_ANON_KEY = "COLE_SUA_PUBLISHABLE_AQUI";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function addTask() {
    const client = document.getElementById("client").value;
    const task = document.getElementById("task").value;
    const owner = document.getElementById("owner").value;
    const due_date = document.getElementById("due_date").value;
    const link = document.getElementById("link").value;

    await supabase.from("tasks").insert([
        { client, task, owner, due_date, link }
    ]);

    loadTasks();
}

async function loadTasks() {
    const { data } = await supabase.from("tasks").select("*");

    const table = document.getElementById("tasks");
    table.innerHTML = "";

    data.forEach(t => {
        table.innerHTML += `
            <tr>
                <td>${t.client}</td>
                <td>${t.task}</td>
                <td>${t.owner}</td>
                <td>${t.done ? 'Concluído' : 'Pendente'}</td>
            </tr>
        `;
    });
}

loadTasks();

</script>

</body>
</html>
