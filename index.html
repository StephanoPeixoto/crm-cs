<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo Serviços A7</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 40px;
}
h1 { color: #d4af37; }
input, button {
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    border: none;
}
input { width: 100%; }
button {
    background: #d4af37;
    color: #000;
    cursor: pointer;
}
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}
th, td {
    border-bottom: 1px solid #333;
    padding: 10px;
}
.status {
    font-weight: bold;
}
.aprovado { color: #00ff88; }
.pendente { color: orange; }
</style>
</head>
<body>

<h1>Fluxo Serviços A7</h1>

<div id="auth">
    <h3>Login</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
    <h3>Nova Tarefa</h3>
    <input id="client" placeholder="Cliente">
    <input id="task" placeholder="Tarefa">
    <input id="owner" placeholder="Responsável">
    <input id="due_date" type="date">
    <input id="link" placeholder="Link">
    <button onclick="addTask()">Adicionar</button>

    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Tarefa</th>
                <th>Responsável</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tasks"></tbody>
    </table>
</div>

<script>
// 🔴 COLE AQUI SUAS CHAVES
const SUPABASE_URL = "https://llkzmbuaoxvaadnhfwhq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_8P0JjWli7v-F2ofwxP1xPw_74gRyEhR";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert("Erro no login");
    } else {
        document.getElementById("auth").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadTasks();
    }
}

async function addTask() {
    const client = document.getElementById("client").value;
    const task = document.getElementById("task").value;
    const owner = document.getElementById("owner").value;
    const due_date = document.getElementById("due_date").value;
    const link = document.getElementById("link").value;

    await supabase.from("tasks").insert([
        { client, task, owner, due_date, link }
    ]);

    loadTasks();
}

async function loadTasks() {
    const { data } = await supabase.from("tasks").select("*");

    const table = document.getElementById("tasks");
    table.innerHTML = "";

    data.forEach(t => {
        const row = `
            <tr>
                <td>${t.client}</td>
                <td>${t.task}</td>
                <td>${t.owner}</td>
                <td class="status ${t.done ? 'aprovado' : 'pendente'}">
                    ${t.done ? 'Concluído' : 'Pendente'}
                </td>
            </tr>
        `;
        table.innerHTML += row;
    });
}
</script>

</body>
</html>
